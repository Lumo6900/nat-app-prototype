<!doctype html>
<html lang="it">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Carte dei Nat — prototipo rito</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <main id="appRoot" class="app">
    <header class="app-header">
      <h1>Carte dei Nat</h1>
      <p id="instruction" class="sr-only">Mischia il mazzo trascinando il dito sulle carte.</p>
    </header>

    <section class="stage" aria-live="polite">
      <div id="deckArea" class="deck-area">
        <div id="deck" class="deck" role="button" tabindex="0" aria-label="Mazzo di carte"></div>
        <p id="deckHint" class="deck-hint hidden">Scuoti il dispositivo per mischiare il mazzo. Fermati quando senti che è il momento.</p>
      </div>

      <div id="spread" class="spread hidden" aria-label="Mazzo a ventaglio"></div>

      <div id="layout" class="layout hidden" aria-label="Schema delle dieci carte"></div>
    </section>

    <section id="baptism" class="baptism hidden">
      <div class="baptism-card">
        <p id="baptismLabel">Battezza la carta</p>
        <canvas id="signature" width="280" height="180"></canvas>
        <div class="row">
          <button id="circleBtn">Disegna cerchio</button>
          <button id="clearBtn">Cancella</button>
        </div>
      </div>
    </section>

    <section id="cardModal" class="card-modal hidden" aria-live="polite">
      <div class="reading-card">
        <p id="modalPosition" class="eyebrow">Posizione</p>
        <div id="largeCard" class="large-card">Carta</div>
        <p id="modalHint">Osserva bene la carta. Quando sei pronto, conferma per leggere il testo.</p>
        <div id="readingText" class="reading-text hidden"></div>
        <div class="row">
          <button id="readBtn">Mostra e leggi testo</button>
          <button id="closeModalBtn" class="secondary">Chiudi</button>
        </div>
      </div>
    </section>

    <footer>
      <button id="primaryBtn">Inizia</button>
      <button id="resetBtn" class="ghost">Ricomincia</button>
    </footer>
  </main>
  <script type="module" src="deck3d.js"></script>
  <script src="app.js"></script>
</body>
</html>
